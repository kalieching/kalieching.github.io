---
layout: default
title: Writing — Kalie Ching
---
<div class="grid-2">
  <aside class="sidebar">
    <a href="/" class="back-link">← Kalie Ching</a>
  </aside>

  <main>
    <section>
      <h2>writing</h2>
      <div class="post-list">
        {% for post in site.posts %}
        <div class="post-item">
          <div class="post-item-header">
            <a href="{{ post.url }}">{{ post.title }}</a>
            <time>{{ post.date | date: "%B %-d, %Y" }}</time>
          </div>
          {% if post.excerpt %}
          <p>{{ post.excerpt | strip_html | truncatewords: 20 }}</p>
          {% endif %}
        </div>
        {% endfor %}
      </div>
    </section>
  </main>
</div>
